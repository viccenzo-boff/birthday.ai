services:
  db:
    image: postgres:16-alpine
    container_name: birthdayai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: birthdayai
    ports:
      - "5432:5432"
    volumes:
      - birthdayai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d birthdayai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  birthdayai_pgdata:
